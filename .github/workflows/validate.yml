# ---------------------------------------------------------------------------
# validate.yml
# Fires on every PR that touches terraform/ — runs fmt, validate, plan,
# and checkov security scan. Posts plan output as a PR comment.
# ---------------------------------------------------------------------------

name: Validate Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  OPENTOFU_VERSION: "1.8.0"
  WORKING_DIR: "./terraform"
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Validate

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}

      - name: OpenTofu Init
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu init -input=false

      - name: Terraform Format
        id: fmt
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu validate -no-color

      - name: OpenTofu Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu plan -no-color -input=false -lock=false 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... truncated ...'
              : plan;

            const fmtStatus = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '❌';
            const validateStatus = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';

            const body = `## Terraform Validation

            | Check | Status |
            |-------|--------|
            | Format | ${fmtStatus} |
            | Validate | ${validateStatus} |
            | Plan | ${planStatus} |

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            *Workflow: \`${{ github.workflow }}\` | Actor: \`${{ github.actor }}\` | Commit: \`${{ github.sha }}\`*`;

            // Delete previous bot comments on this PR to avoid clutter
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments.data) {
              if (comment.user.type === 'Bot' && comment.body.includes('Terraform Validation')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security:
    name: Checkov Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: true   # set false to block PRs on security findings

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        # Requires GitHub Advanced Security — only runs on public repos or orgs with GHAS
        if: always() && github.event.repository.visibility == 'public'
        with:
          sarif_file: checkov-results.sarif
