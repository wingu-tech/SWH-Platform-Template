# ---------------------------------------------------------------------------
# app-deploy.yml
#
# Triggers:
#   - push to main touching application/** → builds only changed app folders
#   - workflow_dispatch (apps=all)         → builds ALL application/* folders
#     (called automatically at end of bootstrap to seed ECR on first deploy)
#
# For each app:
#   1. Create ECR repository if it doesn't exist
#   2. Build Docker image from application/<name>/Dockerfile
#   3. Push with timestamp tag (MMddyyyyHHmm)
#   4. Update application/<name>/k8s/deployment.yaml with new image
#   5. Commit back — ArgoCD picks up the change and deploys
# ---------------------------------------------------------------------------

name: App Deploy

on:
  push:
    branches:
      - main
    paths:
      - "application/**"
  workflow_dispatch:
    inputs:
      apps:
        description: "Comma-separated app names to build, or 'all' for everything"
        required: false
        default: "all"

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  detect:
    name: Detect Apps to Build
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find apps to build
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Build all apps in application/ directory
            APPS=$(find application -maxdepth 1 -mindepth 1 -type d \
              | sed 's|application/||' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # Build only apps changed in this push
            APPS=$(git diff --name-only HEAD~1 HEAD \
              | grep '^application/' \
              | cut -d'/' -f2 \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "apps=$APPS" >> $GITHUB_OUTPUT
          echo "Apps to build: $APPS"

  build-push:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-AppDeploy

      - name: Create ECR repository if not exists
        id: ecr
        run: |
          REPO_NAME="${{ matrix.app }}"
          aws ecr describe-repositories --repository-names "$REPO_NAME" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name "$REPO_NAME" \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --output text > /dev/null

          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "repo=$ECR_REGISTRY/$REPO_NAME" >> $GITHUB_OUTPUT
          echo "ECR repo: $ECR_REGISTRY/$REPO_NAME"

      - name: Build Docker image
        run: |
          TAG=$(date -u +"%m%d%Y%H%M")
          APP_DIR="application/${{ matrix.app }}"
          IMAGE="${{ steps.ecr.outputs.repo }}:$TAG"
          docker build -t "$IMAGE" "$APP_DIR"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Push to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}
          docker push "$IMAGE"
          echo "Pushed: $IMAGE"

      - name: Update deployment.yaml with new image
        run: |
          DEPLOY="application/${{ matrix.app }}/k8s/deployment.yaml"
          sed -i "s|image:.*|image: $IMAGE|" "$DEPLOY"

      - name: Commit updated image tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "application/${{ matrix.app }}/k8s/deployment.yaml"
          git commit -m "deploy(${{ matrix.app }}): image tag $TAG" || echo "No changes to commit"
          git push
