apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app1
  namespace: application
  labels:
    app: sample-app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app1
  template:
    metadata:
      labels:
        app: sample-app1
    spec:
      containers:
        - name: sample-app1
          image: public.ecr.aws/nginx/nginx:alpine
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
